<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatentAI - 前后端联调测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #1e3a8a; margin-bottom: 8px; }
        .subtitle { color: #64748b; margin-bottom: 32px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #1e293b; }
        button {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
        }
        button:hover { background: #1e40af; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .success { color: #059669; }
        .error { color: #dc2626; }
        .info { color: #2563eb; }
        pre {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            margin-top: 12px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-ok { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #dbeafe; color: #1e40af; }
        .library-item, .task-item {
            padding: 12px;
            background: #f8fafc;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
        }
        .library-item strong, .task-item strong {
            color: #1e293b;
        }
        .library-item small, .task-item small {
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PatentAI 前后端联调测试</h1>
        <p class="subtitle">Backend: http://localhost:8000 | Frontend: http://localhost:3001</p>

        <!-- Health Check -->
        <div class="card">
            <h2>1. 健康检查</h2>
            <button onclick="testHealth()">测试连接</button>
            <div id="health-result"></div>
        </div>

        <!-- Libraries -->
        <div class="card">
            <h2>2. 专利库管理</h2>
            <div class="input-group">
                <input type="text" id="lib-name" placeholder="输入专利库名称">
                <button onclick="createLibrary()">创建库</button>
                <button onclick="listLibraries()">刷新列表</button>
            </div>
            <div id="libraries-result"></div>
        </div>

        <!-- Tasks -->
        <div class="card">
            <h2>3. 分析任务</h2>
            <button onclick="listTasks()">获取任务列表</button>
            <div id="tasks-result"></div>
        </div>

        <!-- Batch Import -->
        <div class="card">
            <h2>4. 批量导入模板</h2>
            <button onclick="getImportTemplate()">获取模板</button>
            <div id="template-result"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function fetchApi(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers,
                    },
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                if (response.status === 204) return null;
                return await response.json();
            } catch (error) {
                throw error;
            }
        }

        // Health Check
        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.innerHTML = '<p class="info">测试中...</p>';
            try {
                const data = await fetchApi('/health');
                resultDiv.innerHTML = `
                    <p class="success">✓ 连接成功</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">✗ 连接失败: ${error.message}</p>
                    <p>请确保后端服务器已启动: <code>python -m uvicorn app.main:app --port 8000</code></p>
                `;
            }
        }

        // Create Library
        async function createLibrary() {
            const nameInput = document.getElementById('lib-name');
            const name = nameInput.value.trim();
            if (!name) {
                alert('请输入专利库名称');
                return;
            }
            const resultDiv = document.getElementById('libraries-result');
            resultDiv.innerHTML = '<p class="info">创建中...</p>';
            try {
                await fetchApi('/libraries', {
                    method: 'POST',
                    body: JSON.stringify({ name, description: 'Created from integration test' }),
                });
                nameInput.value = '';
                await listLibraries();
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">创建失败: ${error.message}</p>`;
            }
        }

        // List Libraries
        async function listLibraries() {
            const resultDiv = document.getElementById('libraries-result');
            resultDiv.innerHTML = '<p class="info">加载中...</p>';
            try {
                const data = await fetchApi('/libraries');
                if (data.length === 0) {
                    resultDiv.innerHTML = '<p class="info">暂无专利库</p>';
                    return;
                }
                resultDiv.innerHTML = data.map(lib => `
                    <div class="library-item">
                        <strong>${lib.name}</strong>
                        <span class="status ${lib.patent_count > 0 ? 'status-ok' : 'status-pending'}">
                            ${lib.patent_count} 份专利
                        </span>
                        <br>
                        <small>ID: ${lib.id} | 创建: ${new Date(lib.created_at).toLocaleString()}</small>
                    </div>
                `).join('');
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">加载失败: ${error.message}</p>`;
            }
        }

        // List Tasks
        async function listTasks() {
            const resultDiv = document.getElementById('tasks-result');
            resultDiv.innerHTML = '<p class="info">加载中...</p>';
            try {
                const data = await fetchApi('/tasks');
                if (!data.items || data.items.length === 0) {
                    resultDiv.innerHTML = '<p class="info">暂无任务</p>';
                    return;
                }
                resultDiv.innerHTML = data.items.map(task => `
                    <div class="task-item">
                        <strong>${task.name}</strong>
                        <span class="status status-${task.status === 'completed' ? 'ok' : task.status === 'failed' ? 'error' : 'pending'}">
                            ${task.status}
                        </span>
                        <span class="info">${task.progress}%</span>
                        <br>
                        <small>ID: ${task.id} | 创建: ${new Date(task.created_at).toLocaleString()}</small>
                    </div>
                `).join('');
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">加载失败: ${error.message}</p>`;
            }
        }

        // Get Import Template
        async function getImportTemplate() {
            const resultDiv = document.getElementById('template-result');
            resultDiv.innerHTML = '<p class="info">加载中...</p>';
            try {
                const data = await fetchApi('/batch/template');
                resultDiv.innerHTML = `
                    <p class="success">✓ 模板获取成功</p>
                    <pre>${JSON.stringify(data.template, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">加载失败: ${error.message}</p>`;
            }
        }

        // Auto-run health check on load
        window.onload = testHealth;
    </script>
</body>
</html>
